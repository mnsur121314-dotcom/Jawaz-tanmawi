<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-blue-500 min-h-screen p-4 flex justify-center">

    <div class="bg-gray-50 w-full max-w-sm rounded-[3rem] shadow-2xl p-6 overflow-hidden">
        
        <div class="flex justify-between items-center mb-6">
            <img src="logo.png" class="w-10 h-10 rounded-full">
            <div class="text-right">
                <p class="text-xs text-gray-500">مرحباً، منصور</p>
            </div>
        </div>

        <h2 class="font-bold text-gray-800 mb-3">لوحة صدارة الطلاب</h2>
        <div class="space-y-3 mb-6">
            <div class="bg-white p-3 rounded-2xl flex items-center shadow-sm">
                <div class="bg-yellow-100 px-3 py-1 rounded-lg font-bold text-yellow-700">1st</div>
                <div class="mr-4 flex-1">
                    <p class="font-bold text-sm">أحمد علي</p>
                    <p class="text-xs text-gray-500">340 نقطة</p>
                </div>
                <div class="text-yellow-600 font-black">GOLD</div>
            </div>
            </div>

        <h2 class="font-bold text-gray-800 mb-3">مجموعات الطلاب</h2>
        <div class="space-y-2">
            <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm">
                <span>مجموعة النور</span>
                <span class="text-xs bg-blue-100 px-2 py-1 rounded">25 طالب</span>
            </div>
            <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm">
                <span>مجموعة ب</span>
                <span class="text-xs bg-green-100 px-2 py-1 rounded">25 طالب</span>
            </div>
        </div>

        <div class="fixed bottom-6 bg-white p-3 rounded-full shadow-lg flex justify-around w-[320px]">
            <button class="p-2 bg-blue-100 rounded-full"><i data-lucide="settings"></i></button>
            <button class="p-2 bg-blue-500 text-white rounded-full"><i data-lucide="edit-3"></i></button>
            <button class="p-2 bg-blue-100 rounded-full"><i data-lucide="users"></i></button>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
